services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    # Published by .github/workflows/build-image.yml on every push to main.
    # `docker compose pull && docker compose up` uses the registry image.
    # `docker compose up --build` rebuilds locally (tagged with the same name).
    image: ghcr.io/sajonaro/todo-assistant:latest
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the database is reachable at db:5432.
      APP_DATABASE_URL: postgresql://postgres:postgres@db:5432/todo
      DBOS_SYSTEM_DATABASE_URL: postgresql://postgres:postgres@db:5432/todo_dbos_sys
    ports:
      - "8000:8000"

volumes:
  pgdata:
